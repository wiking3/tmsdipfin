healthcheck-b1:
  stage: healthcheck-b1
  image: alpine/curl:8.17.0
  needs: ["deploy-app-hostb1"]
  variables:
    GIT_DEPTH: 0           # Отключаем shallow clone
    GIT_STRATEGY: clone    # Полный клон
    GIT_CLEAN_FLAGS: -ffdx # Очистка перед клоном
  before_script:
    - rm -rf .git/shallow  # Удаляем shallow файл
  script:
  - |
    echo "Waiting"
    sleep 20
    netstat -tulpn
    curl -f http://${HOSTB1}:5000/
  tags:
    - runner1

healthcheck-b2:
  stage: healthcheck-b2
  image: alpine/curl:8.17.0
  needs: ["deploy-app-hostb2", "healthcheck-b1"]
  variables:
    GIT_DEPTH: 0           # Отключаем shallow clone
    GIT_STRATEGY: clone    # Полный клон
    GIT_CLEAN_FLAGS: -ffdx # Очистка перед клоном
  before_script:
    - rm -rf .git/shallow  # Удаляем shallow файл
  script:
  - |
    echo "Waiting"
    sleep 30
    netstat -tulpn
    curl -f http://${HOSTB2}:5000/
  tags:
    - runner1


cleanup-env-files:
  stage: cleanup-env-files
  variables:
    SSH_OPTIONS: -i ~/.ssh/ansible_id_rsa -o StrictHostKeyChecking=no
  script:
    # Удаление .env файлов на HOSTB1 и HOSTB2
    - ssh $SSH_OPTIONS ansible@"${HOSTB1}" "rm -f /tmp/.env /home/ansible/tmsdipfin/.env"
    - ssh $SSH_OPTIONS ansible@"${HOSTB2}" "rm -f /tmp/.env /home/ansible/tmsdipfin/.env"
    # Проверка удаления .env на B1-B2
    - ssh $SSH_OPTIONS ansible@"${HOSTB1}" "ls -la /tmp/.env /home/ansible/tmsdipfin/.env 2>/dev/null || echo 'Файлы удалены или не существуют'"
    - ssh $SSH_OPTIONS ansible@"${HOSTB2}" "ls -la /tmp/.env /home/ansible/tmsdipfin/.env 2>/dev/null || echo 'Файлы удалены или не существуют'"
  tags:   
    - RUN4SHELL   


